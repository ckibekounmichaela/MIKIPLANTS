<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MikiPlants – Vérification de l'email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        * { box-sizing:border-box; margin:0; padding:0; }
        body {
            min-height:100vh;
            background:linear-gradient(135deg,#0d5c2e 0%,#198754 50%,#20c997 100%);
            display:flex; align-items:center; justify-content:center;
            font-family:'Segoe UI',sans-serif; padding:1.5rem;
            position:relative; overflow:hidden;
        }

        
        body::before {
            content:""; position:absolute; width:500px; height:500px;
            border-radius:50%; background:rgba(255,255,255,0.05);
            top:-150px; right:-150px; pointer-events:none;
        }
        body::after {
            content:""; position:absolute; width:350px; height:350px;
            border-radius:50%; background:rgba(255,255,255,0.04);
            bottom:-120px; left:-80px; pointer-events:none;
        }

        .card-wrap {
            width:100%; max-width:420px;
            background:#fff; border-radius:24px;
            box-shadow:0 20px 60px rgba(0,0,0,0.2);
            overflow:hidden; position:relative; z-index:2;
            animation:fadeUp 0.6s ease both;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(24px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* Top brand bar */
        .brand-bar {
            background:linear-gradient(135deg,#0d5c2e,#198754);
            padding:1.8rem; text-align:center; color:#fff;
        }
        .brand-bar .logo-box {
            width:64px; height:64px; margin:0 auto 0.8rem;
            background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.25);
            border-radius:18px; display:flex; align-items:center; justify-content:center;
            font-size:2rem;
        }
        .brand-bar h1 { font-size:1.5rem; font-weight:800; letter-spacing:-0.5px; }
        .brand-bar p  { font-size:0.82rem; opacity:0.8; margin-top:4px; }

        /* Body */
        .card-body-custom { padding:2.5rem 2rem; text-align:center; }

        /* Status icon area */
        .status-icon-area {
            width:80px; height:80px; margin:0 auto 1.2rem;
            border-radius:50%; display:flex; align-items:center; justify-content:center;
            font-size:2.2rem;
        }
        .status-loading { background:#e8f5e9; }
        .status-success { background:#d1fae5; }
        .status-error   { background:#fee2e2; }

        /* Spinner */
        .spinner-ring {
            width:44px; height:44px;
            border:4px solid #c8e6c9;
            border-top-color:#198754;
            border-radius:50%;
            animation:spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        h2 { font-size:1.4rem; font-weight:800; color:#111827; margin-bottom:0.5rem; }
        p  { color:#6b7280; font-size:0.92rem; line-height:1.6; margin-bottom:1.8rem; }

        .btn-main {
            display:inline-flex; align-items:center; gap:8px;
            background:linear-gradient(135deg,#198754,#20c997);
            color:#fff; font-weight:700; font-size:0.92rem;
            border:none; border-radius:50px; padding:13px 32px;
            text-decoration:none; transition:all 0.2s;
            box-shadow:0 4px 16px rgba(25,135,84,0.3);
            width:100%; justify-content:center;
        }
        .btn-main:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(25,135,84,0.4); color:#fff; }

        .btn-secondary-custom {
            display:inline-flex; align-items:center; gap:8px;
            background:#f4f6f9; color:#374151; font-weight:600; font-size:0.92rem;
            border:none; border-radius:50px; padding:13px 32px;
            text-decoration:none; transition:all 0.2s;
            width:100%; justify-content:center;
        }
        .btn-secondary-custom:hover { background:#e9ecef; color:#111; }
    </style>
</head>
<body>

    <div class="card-wrap">
        <!-- Brand -->
        <div class="brand-bar">
            <div class="logo-box"><i class="bi bi-flower1"></i></div>
            <h1>MikiPlants</h1>
            <p>Vérification de votre adresse email</p>
        </div>

        <!-- Content -->
        <div class="card-body-custom">
            <div class="status-icon-area status-loading" id="statusIconArea">
                <div class="spinner-ring" id="spinnerRing"></div>
            </div>

            <h2 id="statusTitle">Vérification en cours…</h2>
            <p id="statusMessage">Nous vérifions votre adresse email, veuillez patienter quelques instants.</p>

            <a id="actionBtn" href="/" class="btn-main d-none">
                <i class="bi bi-box-arrow-in-right"></i>Se connecter
            </a>
        </div>
    </div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    const params = new URLSearchParams(window.location.search);
    const token  = params.get("token");

    if (!token) {
        showResult("error", "Lien invalide", "Ce lien de vérification est incomplet ou mal formé.");
        return;
    }

    try {
        const response = await fetch(`/api/auth/verify-email?token=${encodeURIComponent(token)}`);
        const data     = await response.json();

        if (response.ok) {
            showResult("success", "Email vérifié !", data.message || "Votre compte est maintenant actif. Vous pouvez vous connecter.");
        } else {
            showResult("error", "Lien invalide", data.detail || "Ce lien est invalide ou a déjà été utilisé.");
        }
    } catch (err) {
        showResult("error", "Erreur de connexion", "Impossible de contacter le serveur. Réessayez plus tard.");
    }
});

function showResult(type, title, message) {
    const area  = document.getElementById("statusIconArea");
    const spin  = document.getElementById("spinnerRing");
    const titleEl = document.getElementById("statusTitle");
    const msgEl   = document.getElementById("statusMessage");
    const btn     = document.getElementById("actionBtn");

    titleEl.textContent = title;
    msgEl.textContent   = message;
    spin.remove();

    if (type === "success") {
        area.className = "status-icon-area status-success";
        area.innerHTML = `<i class="bi bi-check-circle-fill text-success" style="font-size:2.4rem;"></i>`;
        btn.className  = "btn-main";
        btn.innerHTML  = `<i class="bi bi-box-arrow-in-right"></i>Se connecter`;
        btn.href = "/";
    } else {
        area.className = "status-icon-area status-error";
        area.innerHTML = `<i class="bi bi-x-circle-fill text-danger" style="font-size:2.4rem;"></i>`;
        btn.className  = "btn-secondary-custom";
        btn.innerHTML  = `<i class="bi bi-arrow-left"></i>Retour à l'accueil`;
        btn.href = "/";
    }
    btn.classList.remove("d-none");
}
</script>
</body>
</html>
