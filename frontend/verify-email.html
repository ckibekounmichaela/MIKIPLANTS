<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatAPlant – Vérification de l'email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">

<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
    <div class="col-md-6 col-lg-4">

        <!-- Logo -->
        <div class="text-center mb-4">
            <i class="bi bi-flower1 text-success" style="font-size: 3rem;"></i>
            <h2 class="fw-bold text-dark mt-2">WhatAPlant</h2>
        </div>

        <!-- Carte principale -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 text-center">

                <!-- Icône et état (changé par JS selon le résultat) -->
                <div id="statusIcon" class="mb-3">
                    <div class="spinner-border text-success" role="status">
                        <span class="visually-hidden">Vérification...</span>
                    </div>
                </div>

                <h4 id="statusTitle" class="fw-bold mb-2">Vérification en cours...</h4>
                <p id="statusMessage" class="text-muted mb-4">
                    Nous vérifions votre adresse email, veuillez patienter.
                </p>

                <!-- Bouton (caché au départ, affiché après vérification) -->
                <a id="actionBtn" href="/" class="btn btn-success d-none w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                </a>

            </div>
        </div>

    </div>
</div>

<script>
// ============================================================
// LOGIQUE DE VÉRIFICATION D'EMAIL
// ============================================================

/**
 * Au chargement de la page, on extrait le token de l'URL
 * et on appelle l'API pour vérifier le compte.
 *
 * URL attendue : /verify-email?token=UUID
 */
document.addEventListener("DOMContentLoaded", async () => {

    // Extraire le token depuis les paramètres de l'URL
    // URLSearchParams permet de lire ?param=valeur facilement
    const params = new URLSearchParams(window.location.search);
    const token  = params.get("token");

    if (!token) {
        // Pas de token dans l'URL → erreur directe
        showResult("error", "Lien invalide", "Ce lien de vérification est incomplet ou mal formé.");
        return;
    }

    try {
        // Appeler l'API de vérification
        // On utilise fetch directement (pas besoin de JWT ici)
        const response = await fetch(`/api/auth/verify-email?token=${encodeURIComponent(token)}`);
        const data     = await response.json();

        if (response.ok) {
            // Vérification réussie !
            showResult("success", "Email vérifié !", data.message || "Votre compte est maintenant actif.");
        } else {
            // Token invalide ou déjà utilisé
            showResult("error", "Lien invalide", data.detail || "Ce lien est invalide ou a déjà été utilisé.");
        }

    } catch (err) {
        // Erreur réseau
        showResult("error", "Erreur de connexion", "Impossible de contacter le serveur. Réessayez plus tard.");
    }
});


/**
 * Afficher le résultat de la vérification.
 *
 * @param {string} type    - "success" ou "error"
 * @param {string} title   - Titre à afficher
 * @param {string} message - Message descriptif
 */
function showResult(type, title, message) {
    const icon    = document.getElementById("statusIcon");
    const titleEl = document.getElementById("statusTitle");
    const msgEl   = document.getElementById("statusMessage");
    const btn     = document.getElementById("actionBtn");

    titleEl.textContent = title;
    msgEl.textContent   = message;

    if (type === "success") {
        icon.innerHTML = `<i class="bi bi-check-circle-fill text-success" style="font-size:3rem;"></i>`;
        btn.classList.remove("d-none");
        btn.className = "btn btn-success w-100";
        btn.innerHTML = `<i class="bi bi-box-arrow-in-right me-2"></i>Se connecter`;
        btn.href = "/";
    } else {
        icon.innerHTML = `<i class="bi bi-x-circle-fill text-danger" style="font-size:3rem;"></i>`;
        btn.classList.remove("d-none");
        btn.className = "btn btn-outline-secondary w-100";
        btn.innerHTML = `<i class="bi bi-arrow-left me-2"></i>Retour à l'accueil`;
        btn.href = "/";
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
