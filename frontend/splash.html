<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MikiPlants</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            min-height:100vh;
            background:linear-gradient(160deg,#0a3d20 0%,#0d5c2e 30%,#198754 65%,#20c997 100%);
            display:flex; flex-direction:column; align-items:center; justify-content:space-between;
            overflow:hidden; position:relative; font-family:'Segoe UI',sans-serif;
            padding:3rem 2rem 4rem;
        }

        /* ── Cercles décoratifs ── */
        .circle {
            position:absolute; border-radius:50%;
            background:rgba(255,255,255,0.06);
            pointer-events:none;
        }
        .c1 { width:420px; height:420px; top:-160px; right:-140px; }
        .c2 { width:300px; height:300px; bottom:-120px; left:-100px; }
        .c3 { width:160px; height:160px; top:45%; left:3%; opacity:0.5; }
        .c4 { width:100px; height:100px; top:20%; right:5%; opacity:0.4; }

        /* ── Feuilles flottantes ── */
        .leaf {
            position:absolute; font-size:2rem; opacity:0.1;
            animation:float 8s infinite ease-in-out; pointer-events:none;
        }
        .leaf:nth-child(1) { top:6%;  left:5%;  font-size:1.6rem; animation-delay:0s;   animation-duration:7s; }
        .leaf:nth-child(2) { top:12%; right:7%; font-size:2.8rem; animation-delay:1s;   animation-duration:9s; }
        .leaf:nth-child(3) { top:55%; left:3%;  font-size:1.8rem; animation-delay:2s;   animation-duration:6s; }
        .leaf:nth-child(4) { top:65%; right:5%; font-size:2.4rem; animation-delay:0.5s; animation-duration:8s; }
        .leaf:nth-child(5) { top:80%; left:20%; font-size:1.6rem; animation-delay:3s;   animation-duration:8s; }

        @keyframes float {
            0%,100% { transform:translateY(0) rotate(0deg); }
            33%      { transform:translateY(-18px) rotate(8deg); }
            66%      { transform:translateY(10px) rotate(-5deg); }
        }

        /* ══════════════════════════
           SECTION HAUTE — Logo
        ══════════════════════════ */
        .top-section {
            position:relative; z-index:10;
            display:flex; flex-direction:column; align-items:center;
            animation:fadeDown 0.7s ease both;
        }

        @keyframes fadeDown {
            from { opacity:0; transform:translateY(-20px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .logo-box {
            width:100px; height:100px; border-radius:28px;
            background:rgba(255,255,255,0.15); backdrop-filter:blur(12px);
            border:2px solid rgba(255,255,255,0.3);
            display:flex; align-items:center; justify-content:center;
            font-size:3rem; color:#fff;
            box-shadow:0 12px 40px rgba(0,0,0,0.2);
            margin-bottom:1rem;
            animation:pulse 3s infinite ease-in-out;
        }
        @keyframes pulse {
            0%,100% { transform:scale(1); }
            50%      { transform:scale(1.05); }
        }

        .app-name {
            font-size:3rem; font-weight:900; color:#fff;
            letter-spacing:-1px; text-shadow:0 4px 20px rgba(0,0,0,0.3);
            line-height:1;
        }
        .app-name span { color:rgba(255,255,255,0.7); font-weight:400; font-size:1.2rem; display:block; letter-spacing:3px; margin-top:2px; }

        /* ══════════════════════════
           SECTION CENTRALE — Tagline
        ══════════════════════════ */
        .mid-section {
            position:relative; z-index:10;
            text-align:center;
            animation:fadeUp 0.7s 0.15s ease both;
        }

        /* Séparateur décoratif (les ×××× du croquis) */
        .deco-line {
            display:flex; align-items:center; justify-content:center;
            gap:6px; margin-bottom:1.8rem;
        }
        .deco-line .star {
            color:rgba(255,255,255,0.4); font-size:0.9rem;
            animation:twinkle 2s infinite ease-in-out;
        }
        .deco-line .star:nth-child(2) { animation-delay:0.2s; }
        .deco-line .star:nth-child(3) { animation-delay:0.4s; }
        .deco-line .star:nth-child(4) { animation-delay:0.6s; }
        .deco-line .star:nth-child(5) { animation-delay:0.8s; }
        .deco-line .star:nth-child(6) { animation-delay:1.0s; }
        .deco-line .star:nth-child(7) { animation-delay:1.2s; }
        @keyframes twinkle {
            0%,100% { opacity:0.4; transform:scale(1); }
            50%      { opacity:1;   transform:scale(1.3); }
        }

        .tagline {
            font-size:1.4rem; font-weight:700; color:#fff;
            line-height:1.5; text-shadow:0 2px 12px rgba(0,0,0,0.2);
            margin-bottom:0.8rem;
        }
        .tagline em {
            color:#86efac; font-style:normal;
        }

        .sub-tagline {
            font-size:0.88rem; color:rgba(255,255,255,0.65);
            line-height:1.6; max-width:280px; margin:0 auto;
        }

        /* Features chips */
        .chips {
            display:flex; flex-wrap:wrap; justify-content:center;
            gap:8px; margin-top:1.6rem; max-width:320px; margin-left:auto; margin-right:auto;
        }
        .chip {
            background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.22);
            color:rgba(255,255,255,0.88); border-radius:50px;
            padding:6px 14px; font-size:0.76rem; font-weight:500;
            display:flex; align-items:center; gap:5px;
            backdrop-filter:blur(6px);
        }

        /* ══════════════════════════
           SECTION BASSE — Bouton
        ══════════════════════════ */
        .bottom-section {
            position:relative; z-index:10; width:100%;
            max-width:360px;
            animation:fadeUp 0.7s 0.3s ease both;
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(20px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .btn-commencer {
            display:flex; align-items:center; justify-content:center; gap:12px;
            width:100%; padding:18px 32px;
            background:#fff; color:#0d5c2e;
            font-size:1.05rem; font-weight:800; letter-spacing:1.5px; text-transform:uppercase;
            border:none; border-radius:18px;
            box-shadow:0 12px 40px rgba(0,0,0,0.25);
            text-decoration:none; cursor:pointer;
            transition:all 0.25s ease;
            margin-bottom:1.2rem;
        }
        .btn-commencer:hover {
            transform:translateY(-4px);
            box-shadow:0 18px 50px rgba(0,0,0,0.3);
            color:#0a3d20;
        }
        .btn-commencer .arrow {
            width:36px; height:36px; border-radius:10px;
            background:linear-gradient(135deg,#198754,#20c997);
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-size:1rem;
            transition:transform 0.2s;
        }
        .btn-commencer:hover .arrow { transform:translateX(4px); }

        .links-row {
            display:flex; justify-content:center; align-items:center; gap:16px;
        }
        .links-row a {
            color:rgba(255,255,255,0.6); font-size:0.82rem;
            text-decoration:none; transition:color 0.2s;
        }
        .links-row a:hover { color:#fff; }
        .links-row .sep { color:rgba(255,255,255,0.25); font-size:0.5rem; }

        /* Version coin */
        .v-tag {
            position:absolute; top:1.2rem; right:1.5rem;
            font-size:0.68rem; color:rgba(255,255,255,0.3);
            letter-spacing:1.5px; z-index:10;
        }
    </style>
</head>
<body>

    <!-- Déco fond -->
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
    <div class="circle c4"></div>

    <!-- Feuilles -->
    <div class="leaf">🌿</div>
    <div class="leaf">🍃</div>
    <div class="leaf">🌱</div>
    <div class="leaf">🌿</div>
    <div class="leaf">🍃</div>

    <span class="v-tag">v1.0</span>

    <!-- ① LOGO + NOM -->
    <div class="top-section">
        <div class="logo-box">
            <i class="bi bi-flower1"></i>
        </div>
        <div class="app-name">
            MikiPlants
            <span>CÔTE D'IVOIRE</span>
        </div>
    </div>

    <!-- ② TAGLINE + DÉCORATIF -->
    <div class="mid-section">
        <!-- Les ×××× du croquis → étoiles animées -->
        <div class="deco-line">
            <span class="star">✦</span>
            <span class="star">✦</span>
            <span class="star">✦</span>
            <span class="star">✦</span>
            <span class="star">✦</span>
            <span class="star">✦</span>
            <span class="star">✦</span>
        </div>

        <p class="tagline">
            La nature vous parle,<br>
            <em>MikiPlants</em> vous répond.
        </p>
        <p class="sub-tagline">
            Identifiez n'importe quelle plante en une photo.<br>
            Santé · Comestibilité · Toxicité · Médecine
        </p>

        <div class="chips">
            <span class="chip"><i class="bi bi-shield-check"></i> Santé</span>
            <span class="chip"><i class="bi bi-egg-fried"></i> Comestible</span>
            <span class="chip"><i class="bi bi-capsule"></i> Médicinal</span>
            <span class="chip"><i class="bi bi-exclamation-triangle"></i> Toxicité</span>
        </div>
    </div>

    <!-- ③ BOUTON COMMENCER -->
    <div class="bottom-section">
        <a href="/login" class="btn-commencer">
            Commencer
            <div class="arrow"><i class="bi bi-arrow-right"></i></div>
        </a>
        <div class="links-row">
            <a href="/login">Se connecter</a>
            <span class="sep">●</span>
            <a href="/login">Créer un compte</a>
        </div>
    </div>

    <script src="/static/js/api.js?v=2"></script>
    <script>
        // Redirection automatique si déjà connecté
        const token = localStorage.getItem("access_token");
        if (token) {
            try {
                const payload = JSON.parse(atob(token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/")));
                if (payload.exp && payload.exp > Math.floor(Date.now()/1000)) {
                    window.location.href = "/dashboard";
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
